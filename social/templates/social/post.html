<style>
.detail-wrapper{
    display:flex;
    gap:20px;
    align-items:flex-start;
    margin-top:20px;
}

/* کارت اصلی کوچیک‌تر */
.main-post{
    flex:0 0 520px;
    max-width:520px;   /* 👈 محدود کردن عرض */
    background:#fff;
    border-radius:16px;
    padding:12px;
    box-shadow:0 6px 18px rgba(0,0,0,.08);
}

/* wrapper تصویر (کوچیک‌تر شد) */
.img-wrapper{
    position:relative;
    width:100%;
    height:320px;   /* 👈 قبلاً 420 بود */
    overflow:hidden;
    border-radius:14px;
    margin-bottom:12px;
}

/* بک‌گراند blur */
.img-wrapper::before{
    content:"";
    position:absolute;
    inset:0;

    background:url('{{ post.image.url }}') center/cover;
    filter:blur(18px);
    transform:scale(1.2);
    opacity:0.55;
}

/* تصویر اصلی */
.main-img{
    position:relative;
    width:100%;
    height:100%;
    object-fit:contain;  /* بدون کراپ */
    display:block;
    margin:auto;
}

/* کپشن فشرده‌تر */
.post-text{
    font-size:14px;
    line-height:1.6;
    color:#374151;

    background:#f9fafb;
    padding:10px;
    border-radius:10px;

    border:1px solid #eee;
}

/* related هم جمع‌وجورتر */
.related{
    flex:1;
    max-width:350px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

/* mini card کوچیک‌تر */
.mini-card img{
    width:100%;
    height:90px;
    object-fit:cover;
    border-radius:10px;
}

</style>

<div class="detail-wrapper">

    <!-- پست اصلی -->
    <div class="main-post">

        {% if post.image %}
        <div class="img-wrapper">
            <img src="{{ post.image.url }}" class="main-img">
        </div>
        {% endif %}

        <div class="post-text">
            {{ post.content }}
        </div>

    </div>

    <!-- مرتبط‌ها -->
    <div class="related">
        <h4 style="margin-bottom:10px;">پست‌های مرتبط</h4>

        {% for p in related_posts %}
            <a href="{% url 'post_detail' p.id %}" class="mini-card">
                <img src="{{ p.image.url }}">
            </a>
        {% endfor %}
    </div>

</div>
