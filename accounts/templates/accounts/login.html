{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2>ورود</h2>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label>نام کاربری</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>رمز عبور</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary">ورود</button>
            <p class="mt-3">
    <a href="{% url 'password_reset' %}">رمز عبور خود را فراموش کرده‌اید؟</a>
</p>
        </form>
        <p class="mt-3">ثبت‌نام نکرده‌اید؟ <a href="{% url 'register' %}">ثبت‌نام</a></p>
    </div>
</div>
{% endblock %}
