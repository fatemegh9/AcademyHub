{% extends 'base.html' %}
{% block title %}بازیابی رمز عبور{% endblock %}

{% block content %}
<div style="max-width:400px;margin:60px auto;direction:rtl;">
  <div style="background:#fff;border:1px solid #eee;border-radius:16px;padding:30px;box-shadow:0 4px 20px rgba(0,0,0,0.06);">
    <h3 style="margin-bottom:20px;color:#122248;">بازیابی رمز عبور</h3>
    <form method="post">
      {% csrf_token %}
      <label style="font-size:13px;color:#7a8fbb;display:block;margin-bottom:8px;">ایمیل خود را وارد کنید</label>
      <input type="email" name="email" required style="width:100%;padding:12px;border:1px solid #dce4f3;border-radius:10px;margin-bottom:16px;font-size:14px;">
      <button type="submit" style="width:100%;padding:12px;background:#122248;color:#fff;border:none;border-radius:10px;font-size:14px;cursor:pointer;">ارسال لینک بازیابی</button>
    </form>
  </div>
</div>
{% endblock %}
