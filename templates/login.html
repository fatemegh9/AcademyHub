{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AcademyHub — ورود</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body { transform: translateY(100%); transition: transform 0.6s cubic-bezier(0.76,0,0.24,1); }
    html, body {
      height: 100%;
      background: #080d18;
      font-family: 'Vazirmatn', sans-serif;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ─── کارت اصلی ─── */
    .card {
      display: flex;
      flex-direction: row-reverse; /* عکس سمت راست، فرم سمت چپ */
      width: 100%;
      max-width: 900px;
      min-height: 540px;
      border-radius: 22px;
      overflow: hidden;
      border: 0.5px solid rgba(126, 184, 255, 0.1);
      box-shadow: 0 0 60px rgba(126, 184, 255, 0.06);
    }

    /* ─── سمت راست — عکس (بزرگ‌تر) ─── */
    .card-img {
      flex: 1.6;
      background-image: url("{% static 'images/view.jpg' %}");
      background-size: cover;
      background-position: center;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 36px;
    }

    .card-img::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(6, 12, 28, 0.5);
    }

    .img-logo {
      position: absolute;
      top: 28px;
      right: 28px;
      z-index: 1;
      font-size: 17px;
      font-weight: 700;
      color: #f0f4ff;
      text-decoration: none;
    }

    .img-logo-dot { color: #f5a623; }

    .img-text {
      position: relative;
      z-index: 1;
    }

    .img-eyebrow {
      font-size: 10px;
      letter-spacing: 0.18em;
      color: rgba(245, 166, 35, 0.8);
      text-transform: uppercase;
      margin-bottom: 10px;
      font-weight: 500;
    }

    .img-title {
      font-size: 30px;
      font-weight: 900;
      color: #f0f4ff;
      line-height: 1.3;
      margin-bottom: 8px;
    }

    .img-title span { color: #f5a623; }

    .img-sub {
      font-size: 13px;
      color: rgba(240, 244, 255, 0.45);
      line-height: 1.7;
    }

    /* ─── سمت چپ — فرم ─── */
    .card-form {
      width: 320px;
      flex-shrink: 0;
      background: #f0f4ff;
      padding: 48px 36px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .form-title {
      font-size: 22px;
      font-weight: 700;
      color: #080d18;
      margin-bottom: 6px;
    }

    .form-sub {
      font-size: 13px;
      color: #7a8aaa;
      margin-bottom: 32px;
      line-height: 1.6;
    }

    /* ─── فیلدها ─── */
    .field { margin-bottom: 18px; }

    .field label {
      display: block;
      font-size: 12px;
      color: #4a5a7a;
      margin-bottom: 7px;
      font-weight: 500;
    }

    .field input {
      width: 100%;
      background: #fff;
      border: 1.5px solid #dde4f0;
      border-radius: 9px;
      padding: 11px 14px;
      font-size: 14px;
      font-family: 'Vazirmatn', sans-serif;
      color: #080d18;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      direction: ltr;
      text-align: right;
    }

    .field input::placeholder { color: #b0bdd0; }

    .field input:focus {
      border-color: #7eb8ff;
      box-shadow: 0 0 0 3px rgba(126, 184, 255, 0.15);
    }

    .forgot {
      text-align: left;
      margin-top: -10px;
      margin-bottom: 26px;
    }

    .forgot a {
      font-size: 12px;
      color: #7eb8ff;
      text-decoration: none;
      transition: color 0.2s;
    }

    .forgot a:hover { color: #4a9aff; }

    /* ─── دکمه ورود ─── */
    .btn-submit {
      width: 100%;
      background: #080d18;
      color: #f0f4ff;
      font-family: 'Vazirmatn', sans-serif;
      font-size: 15px;
      font-weight: 700;
      padding: 13px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      margin-bottom: 20px;
    }

    .btn-submit:hover {
      background: #0f1a30;
      transform: translateY(-1px);
    }

    .btn-submit:active { transform: scale(0.98); }

    /* ─── divider ─── */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .divider-line {
      flex: 1;
      height: 0.5px;
      background: #dde4f0;
    }

    .divider span {
      font-size: 12px;
      color: #b0bdd0;
    }

    /* ─── دکمه ثبت‌نام ─── */
    .btn-register {
      width: 100%;
      background: transparent;
      color: #4a5a7a;
      font-family: 'Vazirmatn', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 12px;
      border-radius: 10px;
      border: 1.5px solid #dde4f0;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      text-decoration: none;
      display: block;
      text-align: center;
    }

    .btn-register:hover {
      border-color: #7eb8ff;
      color: #7eb8ff;
      background: rgba(126, 184, 255, 0.05);
    }

    /* ─── خطا ─── */
    .error-msg {
      background: rgba(220, 60, 60, 0.08);
      border: 1px solid rgba(220, 60, 60, 0.2);
      color: #e05555;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }

    .error-msg.show { display: block; }

    /* ─── موبایل ─── */
    @media (max-width: 700px) {
      .card {
        flex-direction: column;
        max-width: 420px;
      }

      .card-img {
        flex: none;
        min-height: 220px;
      }

      .card-form {
        width: 100%;
        padding: 32px 24px;
      }
    }
  </style>
</head>
<body>

  <div class="page">
    <div class="card">

      <!-- سمت راست — عکس -->
      <div class="card-img">
        <a href="/" class="img-logo">Academy<span class="img-logo-dot">.</span>Hub</a>
        <div class="img-text">
          <div class="img-eyebrow">شبکه اجتماعی دانشجویی</div>
          <div class="img-title">خوش برگشتی<br><span>به کلاس</span></div>
          <div class="img-sub">جزوه‌هات منتظرتن.</div>
        </div>
      </div>

      <!-- سمت چپ — فرم -->
      <div class="card-form">
        <div class="form-title">ورود به حساب</div>
        <div class="form-sub">سلام! اطلاعاتت رو وارد کن.</div>

        {% if messages %}
          {% for message in messages %}
            <div class="error-msg show">{{ message }}</div>
          {% endfor %}
        {% endif %}

        <form method="POST" action="{% url 'login' %}">
          {% csrf_token %}

          <div class="field">
            <label for="username">ایمیل یا نام کاربری</label>
            <input
              type="text"
              id="username"
              name="username"
              placeholder="example@email.com"
              autocomplete="username"
              required
            >
          </div>

          <div class="field">
            <label for="password">رمز عبور</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            >
          </div>

          <div class="forgot">
            <a href="{% url 'forgot_password' %}">رمز رو فراموش کردی؟</a>
          </div>

          <button type="submit" class="btn-submit">ورود</button>
        </form>

        <div class="divider">
          <div class="divider-line"></div>
          <span>یا</span>
          <div class="divider-line"></div>
        </div>

        <a href="{% url 'register' %}" class="btn-register">ثبت‌نام رایگان</a>
      </div>

    </div>
  </div>
<script>
  window.addEventListener('load', () => {
    document.body.style.transform = 'translateY(0)';
  });
</script>
</body>
</html>
