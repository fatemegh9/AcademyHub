{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AcademyHub — شبکه اجتماعی دانشجویی</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      background: #080d18;
      font-family: 'Vazirmatn', sans-serif;
    }

    /* ─── HERO ─── */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* پس‌زمینه عکس */
    .hero-bg {
      position: absolute;
      inset: 18px;
      border-radius: 20px;
      background-image: url("{% static 'images/view.jpeg' %}");
      background-size: cover;
      background-position: center;
      box-shadow: 0 0 80px 20px rgba(245, 166, 35, 0.12),
                  0 0 120px 40px rgba(20, 60, 120, 0.2);
      transition: inset 0.65s cubic-bezier(0.4, 0, 0.2, 1),
                  border-radius 0.65s cubic-bezier(0.4, 0, 0.2, 1),
                  box-shadow 0.65s ease;
      z-index: 0;
    }

    .hero-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 20px;
      background: rgba(8, 10, 16, 0.55);
      transition: border-radius 0.65s cubic-bezier(0.4, 0, 0.2, 1),
                  background 0.65s ease;
    }

    .hero:hover .hero-bg {
      inset: 0;
      border-radius: 0;
      box-shadow: none;
    }

    .hero:hover .hero-bg::after {
      border-radius: 0;
      background: rgba(8, 10, 16, 0.48);
    }

    /* ─── NAVBAR ─── */
    .nav {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 44px;
    }

    .logo {
      font-size: 19px;
      font-weight: 700;
      color: #f0f4ff;
      letter-spacing: -0.3px;
      text-decoration: none;
    }

    .logo-dot {
      color: #f5a623;
    }

    .btn-nav {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: rgba(255, 255, 255, 0.75);
      font-family: 'Vazirmatn', sans-serif;
      font-size: 13px;
      padding: 8px 22px;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: border-color 0.2s, color 0.2s, transform 0.15s;
    }

    .btn-nav:hover {
      border-color: rgba(255, 255, 255, 0.35);
      color: #fff;
      transform: translateY(-1px);
    }

    /* ─── محتوا ─── */
    .hero-content {
      position: relative;
      z-index: 2;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 24px 80px;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.18em;
      color: rgba(245, 166, 35, 0.75);
      text-transform: uppercase;
      margin-bottom: 22px;
      font-weight: 500;
    }

    .hero-title {
      font-size: clamp(36px, 6vw, 58px);
      font-weight: 900;
      color: #f0f4ff;
      line-height: 1.2;
      margin-bottom: 20px;
      max-width: 580px;
    }

    .highlight {
      color: #f5a623;
      position: relative;
      display: inline-block;
      white-space: nowrap;
    }

    /* انیمیشن underline */
    .highlight::after {
      content: '';
      position: absolute;
      bottom: -4px;
      right: 0;
      width: 0;
      height: 2.5px;
      background: #f5a623;
      border-radius: 2px;
      animation: underline 0.8s 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes underline {
      to { width: 100%; }
    }

    .hero-sub {
      font-size: 15px;
      color: rgba(240, 244, 255, 0.45);
      line-height: 1.9;
      max-width: 340px;
      margin-bottom: 40px;
      font-weight: 400;
    }

    /* ─── دکمه‌ها ─── */
    .hero-btns {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-main {
      background: #f5a623;
      color: #0a0b0f;
      font-family: 'Vazirmatn', sans-serif;
      font-size: 15px;
      font-weight: 700;
      padding: 13px 34px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: background 0.2s, transform 0.15s;
    }

    .btn-main:hover {
      background: #ffc14d;
      transform: translateY(-2px);
    }

    .btn-main:active {
      transform: scale(0.97);
    }

    .btn-ghost {
      background: transparent;
      color: rgba(240, 244, 255, 0.75);
      font-family: 'Vazirmatn', sans-serif;
      font-size: 15px;
      padding: 13px 34px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.15s;
    }

    .btn-ghost:hover {
      background: rgba(255, 255, 255, 0.07);
      border-color: rgba(255, 255, 255, 0.3);
      color: #fff;
      transform: translateY(-2px);
    }

    .btn-ghost:active {
      transform: scale(0.97);
    }

    /* ─── scroll indicator ─── */
    .scroll-hint {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
    }

    .scroll-line {
      width: 1.5px;
      height: 36px;
      background: rgba(255, 255, 255, 0.08);
      position: relative;
      overflow: hidden;
      border-radius: 2px;
    }

    .scroll-line::after {
      content: '';
      position: absolute;
      top: -100%;
      left: 0;
      width: 100%;
      height: 50%;
      background: #f5a623;
      opacity: 0.7;
      animation: scrolldown 2s ease infinite;
    }

    @keyframes scrolldown {
      0%   { top: -60%; }
      100% { top: 160%; }
    }

    /* ─── موبایل ─── */
    @media (max-width: 600px) {
      .nav {
        padding: 18px 20px;
      }

      .hero-bg {
        inset: 10px;
        border-radius: 14px;
      }

      .hero:hover .hero-bg {
        inset: 0;
        border-radius: 0;
      }

      .hero-btns {
        flex-direction: column;
        align-items: center;
      }

      .btn-main, .btn-ghost {
        width: 100%;
        max-width: 280px;
        text-align: center;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .hero-bg, .hero-bg::after { transition: none; }
      .highlight::after { animation: none; width: 100%; }
      .scroll-line::after { animation: none; }
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="hero-bg"></div>

    <nav class="nav">
      <a href="/" class="logo">Academy<span class="logo-dot">.</span>Hub</a>
      <a href="{% url 'login' %}" class="btn-nav">ورود</a>
    </nav>

    <div class="hero-content">
      <div class="eyebrow">شبکه اجتماعی دانشجویی</div>

      <h1 class="hero-title">
        جزوه بده،<br>
        <span class="highlight">باهم رشد کن</span>
      </h1>

      <p class="hero-sub">
        آپلود جزوه، ارتباط با هم‌رشته‌ها،<br>
        و یادگیری اشتراکی — همه یه جا.
      </p>

      <div class="hero-btns">
        <button class="btn-main" onclick="goToPage('{% url 'register' %}')">همین الان بپیوند</button>
        <button class="btn-ghost" onclick="goToPage('{% url 'login' %}')">ورود به حساب</button>
      </div>
    </div>

    <div class="scroll-hint">
      <div class="scroll-line"></div>
    </div>
  </section>

  <script>
   function goToPage(url) {
      document.body.style.transition = 'transform 0.6s cubic-bezier(0.76,0,0.24,1)';
      document.body.style.transform = 'translateY(-100%)';
      setTimeout(() => {
        window.location.href = url;
      }, 300);
}

window.addEventListener('pageshow', function(e) {
  // اگه از cache برگشت (back button)
  document.body.style.transition = 'none';
  document.body.style.transform = 'translateY(0)';

  // بعد از یه فریم transition رو برگردون
  requestAnimationFrame(() => {
    document.body.style.transition = 'transform 0.6s cubic-bezier(0.76,0,0.24,1)';
  });
});
  </script>
</body>
</html>
