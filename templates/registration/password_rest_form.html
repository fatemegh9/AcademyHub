{% extends 'base.html' %}

{% block title %}بازیابی رمز عبور{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4>بازیابی رمز عبور</h4>
            </div>
            <div class="card-body">
                <p>ایمیل خود را وارد کنید. لینک بازیابی برای شما ارسال می‌شود.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">ایمیل</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary">ارسال لینک بازیابی</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
